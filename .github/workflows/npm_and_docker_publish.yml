name: npm and docker build and publish
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write # required for OIDC trusted publishing to npm
  contents: read

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install Dependencies
        run: yarn install

      - name: Build
        run: yarn build:all

      - name: Publish npm package
        run: yarn publish:anchor-tests

      - name: Docker Login
        uses: docker/login-action@v2.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v4.0.0
        with:
          push: true
          tags: stellar/anchor-tests:${{ github.event.release.tag_name }},stellar/anchor-tests:latest
          file: Dockerfile
